# Phase 3 evaluation protocol (§3.2). Zero-shot: no training. Produces ledger [H].
# NOT executed yet — this is the protocol of record; Phase 3 reads it.

# --- horizons (ledger [H] = max) ---
# 5 s grid (configs/data.yaml interval_s). Horizon in minutes -> steps = min*60/5.
# All <= model.future_len = 320 steps (see notes/API_NOTES.md).
horizons_min: [1, 3, 5, 7, 10, 15]   # -> steps [12,36,60,84,120,180] @5s; all <= future_len 320.
# 7min = Kapral'24 forecast anchor (MAE compare); 15min = Zhu'26 IOH anchor (hypotension compare).
H_ledger_min: 15                 # ledger [H]

# --- context window ---
context_min: 30                  # 360 steps of MAP history; confirm vs Phase 2 dynamics
# (TiRex handles long context; context is not capped by future_len.)

# --- rolling-origin sampling ---
origin_stride_min: 5             # new origin every 5 min within a case
warmup_min: 15                   # skip induction; first origin >= max(context_min, warmup) into case
min_origins_per_case: 3          # else case contributes little; note in flow

# --- window validity (per origin) ---
min_context_target_finite: 0.5   # >=50% finite MAP in the context window
min_horizon_target_finite: 0.5   # >=50% finite MAP truth in the horizon (for scoring)
require_future_cov_finite: true  # future covariate must be non-NaN over [0, T+H] to count as "known"

# --- conditions (see PROJECT_PLAN §3.3) ---
conditions:
  M1_with_cov: true              # TiRex-2 + drug future-covariate (primary)
  M0_without_cov: true           # TiRex-2, no covariate (ablation partner)
  B1_persistence: true           # last finite MAP value held flat
  B2_seasonal_naive: false       # MAP has no strong periodicity intraop; off by default
  B3_per_case_ar: true           # AR on this window's own history only (zero-shot-clean)
  B4_mechanistic: false          # optional (Julia LPM; David Lung) — later
  B5_other_tsfm: false           # optional (Chronos/MOMENT) — later

# --- covariate variants to test (§3.2: keep stronger, report both) ---
future_cov_variants:
  rate: [Orchestra/RFTN20_RATE]              # + Orchestra/PPF20_RATE optionally
  ce:   [Orchestra/RFTN20_CE]                # + Orchestra/PPF20_CE optionally
  ce_both: [Orchestra/RFTN20_CE, Orchestra/PPF20_CE]
past_cov: [Solar8000/HR, Solar8000/PLETH_SPO2, Solar8000/CVP]

# --- metrics (§3.4) ---
metrics:
  primary: pinball_crps          # avg pinball over the 9 quantiles ~ CRPS
  median: [mae, rmse]
  calibration: [coverage_80]     # nominal 0.1..0.9 interval
report_per_horizon: true

# --- aggregation & stats (§3.4/§3.7) ---
cluster_by: caseid               # cluster errors by case
overlap_correction: true         # account for window overlap in error bars
bootstrap: case_clustered        # CIs for [X%], [Y%] via case-clustered bootstrap
n_boot: 2000
seed: 0

# --- splits (§3.7) ---
split_by: subjectid              # patient-level separation (not caseid)
dev_fraction: 0.2                # disjoint dev set for any threshold/config choices (e.g. §3.5)

# --- secondary task (§3.5) ---
hypotension:
  map_threshold: 65
  min_sustain_min: 1             # MAP<65 sustained >= 1 min within horizon
  metrics: [auroc, auprc, median_lead_time_min]
